apiVersion: apps/v1
kind: Deployment
metadata:
  name: rwatch-tui
  namespace: rwatch
  labels:
    app: rwatch-tui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rwatch-tui
  template:
    metadata:
      labels:
        app: rwatch-tui
    spec:
      serviceAccountName: rwatch-tui
      containers:
        - name: tui
          image: rwatch-tui:latest
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: true
          env:
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /etc/rwatch
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: rwatch-tui-config
