apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rwatch-tui
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rwatch-tui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rwatch-tui
subjects:
  - kind: ServiceAccount
    name: rwatch-tui
    namespace: rwatch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rwatch-tui
  namespace: rwatch
